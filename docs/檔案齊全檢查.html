<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>日曆記事本（檔案齊全檢查）</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 18px; line-height: 1.55; }
    code { background: #f3f4f6; padding: 2px 6px; border-radius: 6px; }
    .ok { color: #16a34a; font-weight: 700; }
    .bad { color: #dc2626; font-weight: 700; }
    .box { border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; margin: 12px 0; }
  </style>
</head>
<body>
  <h1>日曆記事本：分享圖片功能檢查</h1>
  <p>呢個頁面用嚟幫你確認：<code>manifest.webmanifest</code> 同 <code>sw.js</code> 有冇放齊，因為「Android 分享到 PWA」係靠呢兩樣先會喺分享選單出現。</p>

  <div class="box" id="manifestBox">Manifest：檢查中...</div>
  <div class="box" id="swBox">Service Worker：檢查中...</div>

  <p>如果兩個都係 <span class="ok">OK</span>，但分享選單依然冇顯示，通常要：</p>
  <ol>
    <li>確保用 <strong>HTTPS</strong> 開（或 localhost）</li>
    <li>刪咗舊版已安裝嘅 PWA，再重新「加入主畫面 / 安裝」一次</li>
  </ol>

  <script>
    (async () => {
      // Manifest
      try {
        const r = await fetch('./manifest.webmanifest', { cache: 'no-store' });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const j = await r.json();
        const hasShareTarget = !!(j && j.share_target && j.share_target.action);
        document.getElementById('manifestBox').innerHTML = hasShareTarget
          ? '<span class="ok">OK</span>：manifest.webmanifest 有 share_target（分享入口會出現喺 Android 分享選單）'
          : '<span class="bad">NG</span>：manifest.webmanifest 讀到，但冇 share_target（分享選單未必會有）';
      } catch (e) {
        document.getElementById('manifestBox').innerHTML = '<span class="bad">NG</span>：搵唔到 ./manifest.webmanifest（你而家可能只得 index.html 一個檔）';
      }

      // Service Worker
      try {
        if (!('serviceWorker' in navigator)) throw new Error('no sw');
        const reg = await navigator.serviceWorker.register('./sw.js', { scope: './' });
        document.getElementById('swBox').innerHTML = '<span class="ok">OK</span>：sw.js 可註冊（分享內容先可以入 cache 再俾頁面讀）<br>scope=' + reg.scope;
      } catch (e) {
        document.getElementById('swBox').innerHTML = '<span class="bad">NG</span>：sw.js 註冊失敗或不存在（分享內容就會「睇唔到」）';
      }
    })();
  </script>
</body>
</html>
