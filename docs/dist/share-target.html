<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>分享接收中…</title>
</head>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; padding:16px;">
  <h2 style="margin:0 0 8px;">分享接收中…</h2>
  <p style="margin:0; color:#555;">如果你見到呢頁，請返回 App 主頁。</p>
  <script>
    // Fallback: 即使未被 SW 攔截（例如未安裝/未控制），都嘗試回主頁。
    // 真正分享檔案會由 Service Worker 攔截 POST，然後 303 轉去 ?shared=1。
    try {
      const u = new URL(window.location.href);
      // 避免死循環
      if (!u.searchParams.get('shared')) {
        window.location.replace('./?shared=1');
      }
    } catch (e) {}
  </script>
</body>
</html>
