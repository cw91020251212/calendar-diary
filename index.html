<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <title>日曆記事本</title>
    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --primary: #667eea; --secondary: #764ba2; --bg: #f4f7f6; --surface: #ffffff; --text-main: #2d3748; --text-light: #718096; --border: #e2e8f0; --hover: #edf2f7; }
        body.theme-dark { --primary: #818cf8; --bg: #121212; --surface: #1e1e1e; --text-main: #e2e8f0; --text-light: #a0aec0; --border: #333333; --hover: #2d2d2d; }
        
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text-main); }
        .app-container { display: flex; flex-direction: column; height: 100dvh; }
        header { height: 64px; background: var(--surface); display: flex; align-items: center; justify-content: space-between; padding: 0 12px; border-bottom: 1px solid var(--border); }
        .header-title { font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .icon-btn { background: none; border: none; color: var(--text-main); cursor: pointer; padding: 8px; border-radius: 8px; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--surface); width: 100%; max-width: 600px; max-height: 90dvh; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; }
        .modal-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .modal-body { padding: 16px 20px; overflow-y: auto; }
        
        /* 摺疊選單設計 */
        .section-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-top: 1px solid var(--border); font-weight: bold; cursor: pointer; }
        .section-content { display: none; padding-bottom: 16px; flex-direction: column; gap: 10px; }
        .section-content.active { display: flex; }
        .action-btn { width: 100%; padding: 14px; border-radius: 10px; font-size: 15px; border: 1px solid var(--border); background: var(--surface); color: var(--text-main); cursor: pointer; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-title"><i data-lucide="book-open"></i> 日曆</div>
            <div style="display: flex;">
                <button class="icon-btn" onclick="openToolbox()"><i data-lucide="briefcase"></i></button>
                <button class="icon-btn" onclick="openBackupModal()"><i data-lucide="settings"></i></button>
            </div>
        </header>
        <div class="calendar-main" id="calendarGrid"></div>
    </div>

    <!-- 設定與備份中心 (摺疊版) -->
    <div class="modal-overlay" id="backupModal" onclick="closeModal('backupModal', event)">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">⚙️ 設定與備份</div>
                <button class="icon-btn" onclick="closeModal('backupModal')"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <!-- 摺疊功能區 -->
                <div class="section-header" onclick="toggleSection('cloud-section')">☁️ Google 雲端同步 <i data-lucide="chevron-down"></i></div>
                <div id="cloud-section" class="section-content">
                    <button class="action-btn" onclick="cloudAction('backup')"><i data-lucide="cloud-upload"></i> 同步上傳至雲端</button>
                    <button class="action-btn" onclick="cloudAction('restore')"><i data-lucide="cloud-download"></i> 從雲端還原</button>
                </div>

                <div class="section-header" onclick="toggleSection('manual-section')">💾 本地/手動備份 <i data-lucide="chevron-down"></i></div>
                <div id="manual-section" class="section-content">
                    <button class="action-btn" onclick="exportData()"><i data-lucide="download"></i> 下載備份檔 (.txt)</button>
                    <button class="action-btn" onclick="nativeShareBackup()"><i data-lucide="share-2"></i> 一鍵分享 / 傳送</button>
                    <button class="action-btn" onclick="document.getElementById('importInput').click()"><i data-lucide="upload"></i> 匯入備份檔</button>
                </div>
                
                <div class="section-header" onclick="toggleSection('help-section')">📖 使用手冊 <i data-lucide="chevron-down"></i></div>
                <div id="help-section" class="section-content">
                    <p style="font-size:14px; line-height:1.6; color:var(--text-light);">
                        1. <strong>自動儲存</strong>：編輯器會每 30 秒自動儲存。離開時亦會強制儲存，無需擔心。<br>
                        2. <strong>手動備份</strong>：若要更換手機，請使用「Google 雲端同步」功能。<br>
                        3. <strong>實用工具</strong>：點擊上方「公事包」圖示可查看常用連結。
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        function toggleSection(id) { document.getElementById(id).classList.toggle('active'); }
        function closeModal(id, e) { if (e.target.id === id) document.getElementById(id).classList.remove('active'); }
        function openBackupModal() { document.getElementById('backupModal').classList.add('active'); }
        function openToolbox() { alert('即將加入：工具箱功能...'); }
        // (省略其他核心邏輯...)
    </script>
</body>
</html>
